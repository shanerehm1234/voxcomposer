# Vox Composer — the whole local install in one container: the editor itself
# (built into the image, served as static files) plus the local backend
# (project storage in SQLite, audio transcoding via ffmpeg, the mock-Master
# dev relay). See docs/HOSTING_DECISION.md for why this — not the public
# voxcomposer.app demo — is the real path to driving a physical Vox Master:
# a browser loaded over plain HTTP here can open ws:// to a Master on the
# same LAN with zero restriction; an HTTPS page never can.
#
#   docker compose up -d --build
#
# Then open  http://<this-host>:8080  — that's the editor. Point its
# Settings → Master Connection at your real Master's hostname/IP.

services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    image: voxcomposer-server
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      # SQLite DB + transcode cache live on the persistent volume below.
      DATABASE_URL: file:/data/vox.db
      VOX_CACHE_DIR: /data/cache
      PORT: '8080'
      # Lock this down to your editor's origin in production.
      CORS_ORIGIN: '*'
      # Optional: point at a real Vox Master once its interface is wired.
      # VOX_MASTER_URL: http://192.168.4.1
    volumes:
      - voxdata:/data

volumes:
  voxdata:
